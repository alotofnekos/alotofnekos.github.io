<!DOCTYPE html>
<html lang="en">
	<head>
		
		<!-- Required meta tags -->
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
		
		<!-- Styles -->
		<link rel="stylesheet" href="assets/css/style.css">
		
		<!-- Favicon -->
		<link rel="icon" href="favicon.png" sizes="32x32">
		<link rel="icon" href="favicon.png" sizes="192x192">
		<link rel="apple-touch-icon-precomposed" href="favicon.png">
		<meta name="msapplication-TileImage" content="favicon.png">
		<title>Title</title>
	</head>
	<body>
		<header>
			<p>EV optimizer using Linear Programming. This is still work in progress and is currently non-functional. Current Source code <a href="https://github.com/alotofnekos/alotofnekos.github.io">here!</a></p>
		</header>
		<form id="battleForm">
			<h3>Defending Pokemon:</h3>
			<label for="baseDef">Enter the base Def:</label>
			<input type="number" id="baseDef" min="1" required="">
			<br>
			
			<label for="evsDef">Enter the EVs invested (0-252 only):</label>
			<input type="number" id="evsDef" min="0" required="">
			<label>Does it have a positive nature?</label>
			<input type="radio" id="natureYes" name="nature" value="1" required>
			<label for="natureYes">Yes</label>
			<input type="radio" id="natureNo" name="nature" value="0" required>
			<label for="natureNo">No</label>
			<br>
			
			<label for="baseHP">Enter the base HP:</label>
			<input type="number" id="baseHP" min="1" required="">
			<br>
			
			<label for="evsHP">Enter the EVs invested (0-252 only):</label>
			<input type="number" id="evsHP" min="0" required="">
			<br>
			<br>
			<h3>Attacking Pokemon:</h3>
			<label for="baseAtk">Enter the base Atk of the opposing mon:</label>
			<input type="number" id="baseAtk" min="1" required="">
			<br>
			
			<label for="evsAtk">Enter the EVs invested (0-252 only):</label>
			<input type="number" id="evsAtk" min="0" required="">
			<label>Does it have a positive nature?</label>
			<input type="radio" id="natureAtkYes" name="natureAtk" value="1" required>
			<label for="natureAtkYes">Yes</label>
			<input type="radio" id="natureAtkNo" name="natureAtk" value="0" required>
			<label for="natureAtkNo">No</label>
			<br>
			
			<label for="basePower">Base Power of the Move:</label>
			<input type="number" id="basePower" min="0" required="">
			<label for="stab">Is it STAB? 1 if yes, 0 if no:</label>
			<input type="radio" id="stabYes" name="stab" value="1" required>
			<label for="stabYes">Yes</label>
			<input type="radio" id="stabNo" name="stab" value="0" required>
			<label for="stabNo">No</label>
			<br>
			
			<label for="effectiveness">Effectiveness?</label><br>
			<input type="radio" id="r025" name="effectiveness" value="0.25" required>
			<label for="r025">0.25x (Doubly Resistant)</label><br>
			<input type="radio" id="r05" name="effectiveness" value="0.5" required>
			<label for="r05">0.5x (Resist)</label><br>
			<input type="radio" id="r1" name="effectiveness" value="1" required>
			<label for="r1">1x (Normally Effective)</label><br>
			<input type="radio" id="r2" name="effectiveness" value="2" required>
			<label for="r2">2x (Weak)</label><br>
			<input type="radio" id="r4" name="effectiveness" value="4" required>
			<label for="r4">4x (Doubly Weak)</label>

			<br>
			<label for="desiredPercentage">Enter the desired percentage of HP to be lost (0-100):</label>
			<input type="number" id="desiredPercentage" min="0" required="">
			<br>
			<button type="submit">Calculate</button>
			<main id="content">
				...
			</main>
			<footer>
				...
			</footer>
			
			<!-- Scripts -->
			<script src="assets/js/vendor/jquery-3.6.1.min.js"></script>
			<script src="assets/js/vendor/bootstrap.bundle.min.js"></script>
			<script src="assets/js/vendor/lazyload.min.js"></script>
			<script src="assets/js/vendor/slick.min.js"></script>
			<script src="assets/js/scripts.js"></script>
			<script src="https://unpkg.com/javascript-lp-solver/prod/solver.js"></script>
			<script type="text/javascript" src="script.js"></script>
		</form>
	</body>
</html>
